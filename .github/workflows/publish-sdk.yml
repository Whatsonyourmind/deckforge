name: Publish SDK

on:
  push:
    tags:
      - 'sdk-v*'
  pull_request:
    paths:
      - 'sdk/**'

jobs:
  test:
    name: Test & Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: sdk
        run: npm ci

      - name: Run tests
        working-directory: sdk
        run: npm test

      - name: Build
        working-directory: sdk
        run: npm run build

      - name: Typecheck
        working-directory: sdk
        run: npm run typecheck

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: sdk
        run: npm ci

      - name: Build
        working-directory: sdk
        run: npm run build

      - name: Publish
        working-directory: sdk
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

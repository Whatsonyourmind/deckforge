name: Bug Report
description: Report a bug in DeckForge or the SDK
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: When I try to render a presentation with a waterfall chart, the output is...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Create a presentation with `Presentation.create()`
        2. Add a waterfall chart slide
        3. Call `df.render(ir)`
        4. The response returns...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of DeckForge is affected?
      options:
        - TypeScript SDK (@deckforge/sdk)
        - Python API
        - MCP Server
        - PPTX Rendering
        - Google Slides Rendering
        - Content Generation
        - Charts
        - Themes
        - Billing
        - Other
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: Version of @deckforge/sdk (run `npm list @deckforge/sdk`).
      placeholder: "0.1.0"

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Node.js 18
        - Node.js 20
        - Node.js 22
        - Bun
        - Deno
        - Browser
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
